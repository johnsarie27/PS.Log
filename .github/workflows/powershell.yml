# PSScriptAnalyzer scan that surfaces findings as SARIF on the Security tab.
# Functional analyzer enforcement (build-breaking) lives in validate.yml via
# the psake 'Analyze' task; this workflow is purely for the Security dashboard.

name: PSScriptAnalyzer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: psscriptanalyzer-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    permissions:
      contents: read           # for actions/checkout to fetch code
      security-events: write   # for github/codeql-action/upload-sarif
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run PSScriptAnalyzer
        uses: microsoft/psscriptanalyzer-action@6b2948b1944407914a58661c49941824d149734f # v1.1
        with:
          path: .\
          recurse: true
          output: results.sarif

      - name: Upload SARIF results file
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: results.sarif
