# PSScriptAnalyzer scan that surfaces findings as SARIF on the Security tab.
# Functional analyzer enforcement (build-breaking) lives in validate.yml via
# the psake 'Analyze' task; this workflow is purely for the Security dashboard.

name: PSScriptAnalyzer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: psscriptanalyzer-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    permissions:
      contents: read           # for actions/checkout to fetch code
      security-events: write   # for github/codeql-action/upload-sarif
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $moduleParams = @{
            Scope       = 'CurrentUser'
            Force       = $true
            Repository  = 'PSGallery'
            ErrorAction = 'Stop'
          }

          Install-Module -Name 'PSScriptAnalyzer' -RequiredVersion '1.25.0' @moduleParams
          Install-Module -Name 'ConvertToSARIF' @moduleParams

          Import-Module -Name 'PSScriptAnalyzer' -RequiredVersion '1.25.0' -Force -ErrorAction Stop
          Import-Module -Name 'ConvertToSARIF' -Force -ErrorAction Stop

          $analyzerParams = @{
            Path     = './'
            Recurse  = $true
            Settings = './Build/PSScriptAnalyzerSettings.psd1'
          }

          $sarifParams = @{
            FilePath = 'results.sarif'
          }

          Invoke-ScriptAnalyzer @analyzerParams | ConvertTo-SARIF @sarifParams

      - name: Upload SARIF results file
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: results.sarif
